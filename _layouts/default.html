<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <main class="main-content">
    {{ content }}
  </main>
  {% include footer.html %}

  <!-- jQuery + Magnific Popup -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>

  <script>
    // Image popup — wraps all post images automatically
    $(document).ready(function() {
      $('.post-body img').each(function() {
        if (!$(this).parent().is('a')) {
          $(this).wrap('<a class="img-popup" href="' + $(this).attr('src') + '"></a>');
        } else {
          $(this).parent().addClass('img-popup');
        }
      });
      $('.img-popup').magnificPopup({ type: 'image', closeOnContentClick: true });
    });

    // Dark mode toggle
    const toggle = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    const html = document.documentElement;

    const saved = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', saved);
    icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

    const rougeTheme = document.getElementById('rouge-theme');
    const rougeLight = '{{ "/assets/css/rouge.css" | relative_url }}';
    const rougeDark  = '{{ "/assets/css/rouge-dark.css" | relative_url }}';
    if (rougeTheme) rougeTheme.href = saved === 'dark' ? rougeDark : rougeLight;

    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      if (rougeTheme) rougeTheme.href = next === 'dark' ? rougeDark : rougeLight;
    });

    // Mobile nav toggle
    const navToggle = document.querySelector('.nav-toggle');
    const siteNav = document.querySelector('.site-nav');
    navToggle.addEventListener('click', () => {
      const expanded = navToggle.getAttribute('aria-expanded') === 'true';
      navToggle.setAttribute('aria-expanded', !expanded);
      siteNav.classList.toggle('open');
    });
  </script>
</body>
</html>
