<header class="site-header">
  <div class="header-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}"{% if page.layout == 'home' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/archives/' | relative_url }}"{% if page.url == '/archives/' %} class="active"{% endif %}>Archives</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="active"{% endif %}>About</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon" id="theme-icon"></i>
      </button>
    </nav>
  </div>
</header>
